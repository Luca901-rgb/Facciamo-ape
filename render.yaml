services:
  - type: web
    name: facciamo-ape-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: facciamoape
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: APP_NAME
        value: facciamoape
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: FRONTEND_URL
        value: https://facciamoape.netlify.app
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: lcammarota24@gmail.com
      - key: EMAIL_FROM_NAME
        value: Facciamo Ape
